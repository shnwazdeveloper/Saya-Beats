name: Build Saya Beats APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - fastlane/**
      - asset/**
      - .github/**/*.md
      - .github/FUNDING.yml
      - .github/ISSUE_TEMPLATE/**

jobs:
  build-apk:
    name: Build Android APK only
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft
          cache: gradle

      - name: Allow Gradle wrapper to run
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew androidApp:assembleRelease --no-configuration-cache -PisFullBuild=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: saya-beats-release-apk
          path: androidApp/build/outputs/apk/release/*.apk
